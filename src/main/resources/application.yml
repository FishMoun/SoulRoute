spring:
  application:
    name: SoulRoute
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-2ad107f74e584e57aa2253c25c0867bc}
      chat:
        options:
          model: qwen-plus
    mcp:
      server:
        name: stdio-mcp-server
        version: 1.0.0
        stdio: true
        type: SYNC # 同步
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json

server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.fishmoun.soulroute.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

search-api:
  api-key: ef2LQ2keTvP83ZGQwiKemghX